<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tables in HTML</title>
    <style>
        /* Reset */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

/* Body */
body{
    background:#f4f4f4;
    padding:40px;
}

/* Heading */
h1{
    text-align:center;
    margin-bottom:30px;
    color:#333;
}

/* Table */
table{
    width:70%;
    margin:auto;
    border-collapse:collapse;
    background:white;
    box-shadow:0 5px 15px rgba(0,0,0,0.15);
    border-radius:10px;
    overflow:hidden;
}

/* Table Header */
thead{
    background:#0077cc;
    color:white;
}

th{
    padding:15px;
    font-size:18px;
}

/* Table Data */
td{
    padding:15px;
    text-align:center;
    border-bottom:1px solid #ddd;
}

/* Zebra Effect */
tbody tr:nth-child(even){
    background:#f8f8f8;
}

/* Hover Effect */
tbody tr:hover{
    background:#d9ecff;
    cursor:pointer;
    transition:0.3s;
}

/* Last Row Border Remove */
tbody tr:last-child td{
    border-bottom:none;
}

/* Responsive */
@media (max-width:768px){

    body{
        padding:20px;
    }

    table{
        width:100%;
    }

    th,
    td{
        padding:10px;
        font-size:15px;
    }

}
    </style>
</head>
<body>
    <h1>Tables</h1>
    <table>
        <!-- Table Head  -->
        <thead> 
            <!-- Table Row -->
            <tr>
                <!-- Table Head  -->
            <th>
                Name
            </th>
            <th>
                Roll no
            </th>
            <th>
                CGPA
            </th>
            </tr>
        </thead>
        <!-- Table Body  -->
        <tbody>
            <tr>
                <td>
                    Zain
                </td> 
                <td>81</td>
                <td>3.46</td>
            </tr>
            <tr>
                <td>
                    Jamshaid
                </td> 
                <td>90</td>
                <td>3.70</td>
            </tr>
            <tr>
                <td>
                    Wali
                </td> 
                <td>88</td>
                <td>3.16</td>
            </tr>
        
        </tbody>
    </table>
</body>
</html>
